services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentic-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentic_research_db
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentic-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: agentic-ollama
    ports:
      - '11434:11434'
    volumes:
      - /mnt/e/ollama-data:/root/.ollama
    networks:
      - agentic-network
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    profiles:
      - ollama

  app:
    build: .
    container_name: agentic-api
    ports:
      - '3005:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: 'postgresql://postgres:postgres@postgres:5432/agentic_research_db'
      API_KEY: 'your-dev-api-key'
      OPENAI_API_KEY: '${OPENAI_API_KEY:-}'
      OLLAMA_BASE_URL: 'http://ollama:11434'
    volumes:
      - ./src:/app/src  # Enable hot reload for source files
    command: pnpm dev  # Use dev server with file watching
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agentic-network
    profiles:
      - app

volumes:
  postgres_data:
  ollama_data:

networks:
  agentic-network:
    driver: bridge
